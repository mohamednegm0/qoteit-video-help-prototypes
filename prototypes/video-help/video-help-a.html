    <style>
        /* ===== Floating Help Widget ===== */
        .help-fab {
            position: fixed;
            bottom: 32px;
            left: 32px;
            z-index: 1000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #127EE3, #49B3C9);
            color: #fff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 6px 24px rgba(18, 126, 227, 0.35);
            transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
        }
        .help-fab:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 32px rgba(18, 126, 227, 0.45);
        }
        .help-fab.active {
            transform: rotate(45deg);
            background: linear-gradient(135deg, #F1646C, #F3A73D);
        }
        .help-fab .fab-icon { transition: transform 0.3s; }

        /* Panel */
        .help-panel {
            position: fixed;
            bottom: 104px;
            left: 32px;
            z-index: 999;
            width: 400px;
            max-height: 560px;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            transition: opacity 0.35s cubic-bezier(.34,1.56,.64,1), transform 0.35s cubic-bezier(.34,1.56,.64,1);
        }
        .help-panel.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .help-panel-header {
            background: linear-gradient(135deg, #127EE3, #0d6bd0);
            color: #fff;
            padding: 24px;
        }
        .help-panel-header h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .help-panel-header p {
            font-size: 13px;
            opacity: 0.85;
        }

        .help-search-wrap {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .help-search {
            width: 100%;
            height: 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0 14px;
            font-family: inherit;
            font-size: 14px;
            background: var(--bg-main);
            outline: none;
            transition: border-color 0.2s;
        }
        .help-search:focus { border-color: #127EE3; }

        .help-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .help-cat-btn {
            padding: 10px 22px;
            border-radius: 24px;
            border: 1.5px solid var(--border-color);
            background: var(--bg-card);
            font-family: 'Noto Sans Arabic', sans-serif;
            font-size: 14px;
            font-weight: 500;
            line-height: 1;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
            box-sizing: border-box;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 40px;
        }
        .help-cat-btn.active {
            background: #127EE3;
            border-color: #127EE3;
            color: #fff;
        }
        .help-cat-btn:hover:not(.active) {
            background: #E6F0FF;
            border-color: #B3D4FF;
            color: #127EE3;
        }

        .help-video-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .help-video-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .help-video-item:hover { background: #F8FAFC; }

        .help-video-thumb {
            width: 72px;
            height: 48px;
            border-radius: 8px;
            background: linear-gradient(135deg, #E2E5EC, #F4F6F9);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brand-primary);
            font-size: 18px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .help-video-thumb::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(18,126,227,0.08), rgba(73,179,201,0.08));
        }

        .help-video-meta { flex: 1; min-width: 0; }
        .help-video-meta h4 {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
        }
        .help-video-meta span {
            font-size: 12px;
            color: var(--text-muted);
        }
        .help-video-duration {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-main);
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        /* Video Modal */
        .video-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(4px);
        }
        .video-modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .video-modal {
            background: var(--bg-card);
            border-radius: 16px;
            width: 90%;
            max-width: 720px;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
        }
        .video-modal-overlay.open .video-modal {
            transform: scale(1);
        }
        .video-modal-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .video-modal-top h3 {
            font-size: 16px;
            font-weight: 600;
        }
        .video-modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--bg-main);
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .video-modal-close:hover { background: #E2E5EC; }

        .video-player-area {
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 48px;
            position: relative;
        }
        .video-player-area .play-overlay {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(18,126,227,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .video-player-area .play-overlay:hover { transform: scale(1.1); }
        .video-modal-desc {
            padding: 16px 20px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        /* Page background content for demo */
        .demo-page-content {
            padding: 40px 0;
        }
        .demo-page-content .stat-card {
            cursor: default;
        }

        @media (max-width: 768px) {
            .help-panel {
                left: 16px;
                right: 16px;
                width: auto;
                bottom: 88px;
                max-height: 70vh;
            }
            .help-fab {
                bottom: 20px;
                left: 20px;
                width: 52px;
                height: 52px;
                font-size: 22px;
            }
            .video-modal { width: 95%; }
        }
    </style>

            { id: 4, title: 'إنشاء عرض سعر', desc: 'أنشئ عرض سعر احترافي وأرسله لعميلك', category: 'quotes', duration: '4:00', icon: 'fa-file-invoice-dollar' },
            { id: 5, title: 'الإعداد وبدء الاستخدام', desc: 'ابدأ رحلتك مع كوت إت — إعداد الحساب خطوة بخطوة', category: 'settings', duration: '5:20', icon: 'fa-rocket' },
            { id: 6, title: 'إعدادات التحكم في أنواع الضرائب', desc: 'أضف وعدّل أنواع الضرائب المطبّقة على تسعيراتك', category: 'settings', duration: '2:10', icon: 'fa-percent' },
            { id: 7, title: 'تخصيص الشروط والأحكام', desc: 'خصص الشروط والأحكام التي تظهر في عروض الأسعار', category: 'settings', duration: '1:55', icon: 'fa-file-contract' },
            { id: 8, title: 'إضافة تصنيف', desc: 'نظّم منتجاتك وخدماتك باستخدام التصنيفات', category: 'products', duration: '1:40', icon: 'fa-tags' },
            { id: 9, title: 'إضافة حقول مخصصة', desc: 'أضف حقول إضافية تناسب طبيعة عملك', category: 'settings', duration: '3:00', icon: 'fa-sliders' },
        ];

        let currentCategory = 'all';

        function renderVideos(filter = '') {
            const list = document.getElementById('videoList');
            const filtered = videos.filter(v => {
                const matchCat = currentCategory === 'all' || v.category === currentCategory;
                const matchSearch = v.title.includes(filter) || v.desc.includes(filter);
                return matchCat && matchSearch;
            });
            list.innerHTML = filtered.map(v => `
                <div class="help-video-item" onclick="openVideoModal('${v.title}', '${v.desc}')">
                    <div class="help-video-thumb"><i class="fa-solid ${v.icon}"></i></div>
                    <div class="help-video-meta">
                        <h4>${v.title}</h4>
                        <span>${v.desc.substring(0, 40)}...</span>
                    </div>
                    <div class="help-video-duration">${v.duration}</div>
                </div>
            `).join('');
        }

        function toggleHelpPanel() {
            const panel = document.getElementById('helpPanel');
            const fab = document.getElementById('helpFab');
            panel.classList.toggle('open');
            fab.classList.toggle('active');
        }

        function filterCategory(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.help-cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderVideos(document.querySelector('.help-search').value);
        }

        function filterVideos(query) {
            renderVideos(query);
        }

        function openVideoModal(title, desc) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalDesc').textContent = desc;
            document.getElementById('videoModal').classList.add('open');
        }

        function closeVideoModal() {
            document.getElementById('videoModal').classList.remove('open');
        }

        document.getElementById('videoModal').addEventListener('click', function(e) {
            if (e.target === this) closeVideoModal();
        });

        // Initialize
        renderVideos();
    </script>
</body>
</html>
