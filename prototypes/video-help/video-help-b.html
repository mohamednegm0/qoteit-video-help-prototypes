    <style>
        /* ===== Help Center Page ===== */
        .help-hero {
            background: linear-gradient(135deg, #127EE3 0%, #0d6bd0 40%, #49B3C9 100%);
            padding: 60px 30px 50px;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .help-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -10%;
            width: 60%;
            height: 200%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .help-hero h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            position: relative;
        }
        .help-hero p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 28px;
            position: relative;
        }
        .help-hero-search {
            max-width: 520px;
            margin: 0 auto;
            position: relative;
        }
        .help-hero-search input {
            width: 100%;
            height: 52px;
            border-radius: 12px;
            border: none;
            padding: 0 52px 0 20px;
            font-family: inherit;
            font-size: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            outline: none;
        }
        .help-hero-search i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }

        .help-stats {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-top: 32px;
            position: relative;
        }
        .help-stat-item {
            text-align: center;
        }
        .help-stat-item .stat-num {
            font-size: 28px;
            font-weight: 700;
        }
        .help-stat-item .stat-lbl {
            font-size: 13px;
            opacity: 0.85;
        }

        /* Category filter pills */
        .help-filters {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 24px 30px 8px;
            flex-wrap: wrap;
        }
        .help-filter-pill {
            padding: 8px 20px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            font-family: inherit;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .help-filter-pill:hover {
            border-color: #B3D4FF;
            color: #127EE3;
        }
        .help-filter-pill.active {
            background: #127EE3;
            color: white;
            border-color: #127EE3;
        }
        .help-filter-pill i { font-size: 13px; }

        /* Video grid */
        .help-grid-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 30px 60px;
        }
        .help-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        .help-video-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.25s, box-shadow 0.25s;
            cursor: pointer;
        }
        .help-video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .help-card-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .help-card-thumb .thumb-icon {
            font-size: 40px;
            color: rgba(255,255,255,0.15);
        }
        .help-card-thumb .play-btn {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(18,126,227,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.25s, transform 0.25s;
        }
        .help-video-card:hover .play-btn {
            opacity: 1;
            transform: scale(1);
        }
        .help-card-thumb .dur-badge {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
        }
        .help-card-thumb .cat-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(18,126,227,0.85);
            color: #fff;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
        }
        .help-card-body {
            padding: 16px 18px;
        }
        .help-card-body h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .help-card-body p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .help-card-footer {
            padding: 0 18px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .help-card-footer .views {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .watched-badge {
            font-size: 11px;
            color: #009688;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Video Modal for B */
        .hc-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(4px);
        }
        .hc-modal-overlay.open { opacity: 1; pointer-events: all; }
        .hc-modal {
            background: var(--bg-card);
            border-radius: 16px;
            width: 90%;
            max-width: 900px;
            display: flex;
            overflow: hidden;
            transform: scale(0.92);
            transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
            box-shadow: 0 24px 64px rgba(0,0,0,0.3);
            max-height: 80vh;
        }
        .hc-modal-overlay.open .hc-modal { transform: scale(1); }
        .hc-modal-main { flex: 1; display: flex; flex-direction: column; }
        .hc-modal-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 48px;
        }
        .hc-modal-player .play-circle {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: rgba(18,126,227,0.9);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer;
        }
        .hc-modal-info {
            padding: 20px;
        }
        .hc-modal-info h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .hc-modal-info p { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
        .hc-modal-close {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }
        .hc-modal-sidebar {
            width: 280px;
            background: var(--bg-main);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            flex-shrink: 0;
        }
        .hc-sidebar-title {
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
        }
        .hc-sidebar-item {
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid var(--border-color);
        }
        .hc-sidebar-item:hover { background: #E6F0FF; }
        .hc-sidebar-item.active { background: #E6F0FF; border-right: 3px solid #127EE3; }
        .hc-sidebar-item .sb-thumb {
            width: 48px; height: 32px;
            border-radius: 4px;
            background: #2a2a3e;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.4);
            font-size: 12px; flex-shrink: 0;
        }
        .hc-sidebar-item .sb-info h4 { font-size: 12px; font-weight: 500; color: var(--text-primary); }
        .hc-sidebar-item .sb-info span { font-size: 11px; color: var(--text-muted); }

        @media (max-width: 1200px) {
            .help-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .help-hero { padding: 40px 20px 36px; }
            .help-hero h1 { font-size: 26px; }
            .help-grid { grid-template-columns: 1fr; }
            .help-stats { gap: 24px; }
            .hc-modal { flex-direction: column-reverse; }
            .hc-modal-sidebar { width: 100%; max-height: 200px; border-right: none; border-top: 1px solid var(--border-color); }
            .help-grid-container { padding: 16px; }
        }
    </style>
</head>

                    <h2 id="hcModalTitle">عنوان الفيديو</h2>
                    <p id="hcModalDesc">وصف الفيديو</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div style="text-align: center; padding: 30px; color: var(--text-muted); font-size: 12px;">
        كوت إت 2026 ©
    </div>

    <script>
        const videos = [
            { id: 1, title: 'إضافة عميل', desc: 'تعلّم كيف تضيف عميل جديد إلى قائمة العملاء في كوت إت', category: 'customers', catLabel: 'العملاء', duration: '2:30', icon: 'fa-user-plus', watched: true },
            { id: 2, title: 'إضافة أكثر عميل عن طريق ملف إكسل', desc: 'استورد عملاءك بالجملة من ملف إكسل بضغطة واحدة', category: 'customers', catLabel: 'العملاء', duration: '3:15', icon: 'fa-file-excel', watched: false },
            { id: 3, title: 'إضافة منتج', desc: 'أضف منتجاتك وخدماتك مع الأسعار والتفاصيل', category: 'products', catLabel: 'المنتجات', duration: '2:45', icon: 'fa-box', watched: true },
            { id: 4, title: 'إنشاء عرض سعر', desc: 'أنشئ عرض سعر احترافي وأرسله لعميلك مباشرة', category: 'quotes', catLabel: 'التسعيرات', duration: '4:00', icon: 'fa-file-invoice-dollar', watched: false },
            { id: 5, title: 'الإعداد وبدء الاستخدام', desc: 'ابدأ رحلتك مع كوت إت — إعداد الحساب خطوة بخطوة', category: 'settings', catLabel: 'الإعدادات', duration: '5:20', icon: 'fa-rocket', watched: false },
            { id: 6, title: 'إعدادات التحكم في أنواع الضرائب', desc: 'أضف وعدّل أنواع الضرائب المطبّقة على تسعيراتك', category: 'settings', catLabel: 'الإعدادات', duration: '2:10', icon: 'fa-percent', watched: false },
            { id: 7, title: 'تخصيص الشروط والأحكام', desc: 'خصص الشروط والأحكام التي تظهر في عروض الأسعار', category: 'settings', catLabel: 'الإعدادات', duration: '1:55', icon: 'fa-file-contract', watched: false },
            { id: 8, title: 'إضافة تصنيف', desc: 'نظّم منتجاتك وخدماتك باستخدام التصنيفات', category: 'products', catLabel: 'المنتجات', duration: '1:40', icon: 'fa-tags', watched: false },
            { id: 9, title: 'إضافة حقول مخصصة', desc: 'أضف حقول إضافية تناسب طبيعة عملك', category: 'settings', catLabel: 'الإعدادات', duration: '3:00', icon: 'fa-sliders', watched: true },
        ];

        let currentCat = 'all';

        function renderGrid(search = '') {
            const grid = document.getElementById('helpGrid');
            const filtered = videos.filter(v => {
                const mc = currentCat === 'all' || v.category === currentCat;
                const ms = v.title.includes(search) || v.desc.includes(search);
                return mc && ms;
            });
            grid.innerHTML = filtered.map(v => `
                <div class="help-video-card" onclick="openHcModal(${v.id})">
                    <div class="help-card-thumb">
                        <i class="fa-solid ${v.icon} thumb-icon"></i>
                        <div class="play-btn"><i class="fa-solid fa-play" style="margin-right: -2px;"></i></div>
                        <span class="dur-badge">${v.duration}</span>
                        <span class="cat-badge">${v.catLabel}</span>
                    </div>
                    <div class="help-card-body">
                        <h3>${v.title}</h3>
                        <p>${v.desc}</p>
                    </div>
                    <div class="help-card-footer">
                        <span class="views"><i class="fa-regular fa-eye"></i> ${Math.floor(Math.random()*200+50)}</span>
                        ${v.watched ? '<span class="watched-badge"><i class="fa-solid fa-circle-check"></i> تمت المشاهدة</span>' : ''}
                    </div>
                </div>
            `).join('');
        }

        function filterCat(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.help-filter-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid();
        }

        function filterHelpVideos(q) { renderGrid(q); }

        function openHcModal(id) {
            const v = videos.find(x => x.id === id);
            document.getElementById('hcModalTitle').textContent = v.title;
            document.getElementById('hcModalDesc').textContent = v.desc;
            // Related videos
            const related = videos.filter(x => x.category === v.category && x.id !== v.id).concat(videos.filter(x => x.category !== v.category).slice(0,3));
            document.getElementById('hcSidebarList').innerHTML = related.slice(0,6).map(r => `
                <div class="hc-sidebar-item ${r.id === v.id ? 'active' : ''}" onclick="openHcModal(${r.id})">
                    <div class="sb-thumb"><i class="fa-solid fa-play" style="font-size: 10px;"></i></div>
                    <div class="sb-info"><h4>${r.title}</h4><span>${r.duration}</span></div>
                </div>
            `).join('');
            document.getElementById('hcModal').classList.add('open');
        }

        function closeHcModal() { document.getElementById('hcModal').classList.remove('open'); }

        document.getElementById('hcModal').addEventListener('click', function(e) {
            if (e.target === this) closeHcModal();
        });

        renderGrid();
    </script>
</body>
</html>
