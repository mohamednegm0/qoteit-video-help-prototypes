    <style>
        /* ===== Command Palette ===== */
        .cmd-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 12vh;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .cmd-overlay.open { opacity: 1; pointer-events: all; }

        .cmd-palette {
            width: 600px;
            max-width: 95vw;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
            overflow: hidden;
            transform: scale(0.96) translateY(-10px);
            transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
        }
        .cmd-overlay.open .cmd-palette {
            transform: scale(1) translateY(0);
        }

        .cmd-search-row {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .cmd-search-icon {
            font-size: 20px;
            color: var(--brand-primary);
        }
        .cmd-search-input {
            flex: 1;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 16px;
            background: transparent;
            color: var(--text-primary);
        }
        .cmd-search-input::placeholder { color: var(--text-muted); }
        .cmd-shortcut {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-main);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .cmd-results {
            max-height: 420px;
            overflow-y: auto;
        }

        .cmd-section-label {
            padding: 10px 20px 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cmd-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .cmd-item:hover, .cmd-item.selected {
            background: #E6F0FF;
        }
        .cmd-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #E2E5EC, #F4F6F9);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brand-primary);
            font-size: 16px;
            flex-shrink: 0;
        }
        .cmd-item.selected .cmd-item-icon {
            background: linear-gradient(135deg, #127EE3, #49B3C9);
            color: #fff;
        }
        .cmd-item-info { flex: 1; min-width: 0; }
        .cmd-item-info h4 {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
        }
        .cmd-item-info span {
            font-size: 12px;
            color: var(--text-muted);
        }
        .cmd-item-badges {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .cmd-cat-badge {
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 12px;
            background: #F4F6F9;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .cmd-dur-badge {
            font-size: 10px;
            color: var(--text-muted);
        }

        .cmd-footer {
            padding: 10px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }
        .cmd-footer span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .cmd-footer kbd {
            background: var(--bg-main);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: inherit;
        }

        .cmd-empty {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }
        .cmd-empty i {
            font-size: 36px;
            color: var(--border-color);
            margin-bottom: 12px;
            display: block;
        }

        /* Video Modal */
        .cmd-video-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(4px);
        }
        .cmd-video-modal.open { opacity: 1; pointer-events: all; }
        .cmd-video-box {
            background: var(--bg-card);
            border-radius: 16px;
            width: 90%;
            max-width: 720px;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
            box-shadow: 0 24px 64px rgba(0,0,0,0.3);
        }
        .cmd-video-modal.open .cmd-video-box { transform: scale(1); }
        .cmd-vb-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .cmd-vb-header h3 { font-size: 16px; font-weight: 600; }
        .cmd-vb-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--bg-main);
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .cmd-vb-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cmd-vb-player .play-circle {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: rgba(18,126,227,0.9);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 28px; cursor: pointer;
        }

        /* Trigger hint bar */
        .cmd-hint-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            padding: 10px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            z-index: 50;
            animation: hintPulse 2s ease-in-out infinite;
        }
        .cmd-hint-bar kbd {
            background: var(--bg-main);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-family: inherit;
            font-weight: 600;
            color: var(--brand-primary);
        }
        @keyframes hintPulse {
            0%, 100% { box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
            50% { box-shadow: 0 4px 32px rgba(18,126,227,0.2); }
        }

        .demo-page-content { padding: 40px 0; }

        @media (max-width: 768px) {
            .cmd-palette { width: 95vw; }
            .cmd-hint-bar { bottom: 16px; font-size: 12px; padding: 8px 16px; }
        }
    </style>

    <script>
        const videos = [
            { id: 1, title: 'إضافة عميل', cat: 'العملاء', duration: '2:30', icon: 'fa-user-plus' },
            { id: 2, title: 'إضافة أكثر عميل عن طريق ملف إكسل', cat: 'العملاء', duration: '3:15', icon: 'fa-file-excel' },
            { id: 3, title: 'إضافة منتج', cat: 'المنتجات', duration: '2:45', icon: 'fa-box' },
            { id: 4, title: 'إنشاء عرض سعر', cat: 'التسعيرات', duration: '4:00', icon: 'fa-file-invoice-dollar' },
            { id: 5, title: 'الإعداد وبدء الاستخدام', cat: 'الإعدادات', duration: '5:20', icon: 'fa-rocket' },
            { id: 6, title: 'إعدادات التحكم في أنواع الضرائب', cat: 'الإعدادات', duration: '2:10', icon: 'fa-percent' },

            { id: 8, title: 'إضافة تصنيف', cat: 'المنتجات', duration: '1:40', icon: 'fa-tags' },
            { id: 9, title: 'إضافة حقول مخصصة', cat: 'الإعدادات', duration: '3:00', icon: 'fa-sliders' },
        ];

        const recentSearches = ['إضافة عميل', 'عرض سعر', 'إضافة منتج'];
        let selectedIdx = 0;
        let filteredVideos = [...videos];

        function renderResults(search = '') {
            const container = document.getElementById('cmdResults');

            if (!search) {
                // Show recent + all
                container.innerHTML = `
                    <div class="cmd-section-label"><i class="fa-regular fa-clock" style="margin-left: 4px;"></i> عمليات البحث الأخيرة</div>
                    ${recentSearches.map(r => `
                        <div class="cmd-item" onclick="document.getElementById('cmdInput').value='${r}'; searchPalette('${r}')">
                            <div class="cmd-item-icon" style="background:#F8FAFC;"><i class="fa-regular fa-clock" style="color:var(--text-muted);font-size:14px;"></i></div>
                            <div class="cmd-item-info"><h4>${r}</h4></div>
                        </div>
                    `).join('')}
                    <div class="cmd-section-label"><i class="fa-solid fa-graduation-cap" style="margin-left: 4px;"></i> جميع الدروس</div>
                    ${videos.map((v, i) => `
                        <div class="cmd-item ${i === selectedIdx ? 'selected' : ''}" onclick="playVideo('${v.title}')" onmouseenter="selectedIdx=${i};highlightItem(${i})">
                            <div class="cmd-item-icon"><i class="fa-solid ${v.icon}"></i></div>
                            <div class="cmd-item-info"><h4>${v.title}</h4><span>${v.cat}</span></div>
                            <div class="cmd-item-badges">
                                <span class="cmd-cat-badge">${v.cat}</span>
                                <span class="cmd-dur-badge">${v.duration}</span>
                            </div>
                        </div>
                    `).join('')}
                `;
            } else {
                filteredVideos = videos.filter(v => v.title.includes(search) || v.cat.includes(search));
                selectedIdx = 0;
                if (filteredVideos.length === 0) {
                    container.innerHTML = `<div class="cmd-empty"><i class="fa-regular fa-face-meh-blank"></i>لم يتم العثور على نتائج لـ "${search}"</div>`;
                    return;
                }
                container.innerHTML = `
                    <div class="cmd-section-label">نتائج البحث (${filteredVideos.length})</div>
                    ${filteredVideos.map((v, i) => `
                        <div class="cmd-item ${i === selectedIdx ? 'selected' : ''}" onclick="playVideo('${v.title}')" onmouseenter="selectedIdx=${i};highlightItem(${i})">
                            <div class="cmd-item-icon"><i class="fa-solid ${v.icon}"></i></div>
                            <div class="cmd-item-info"><h4>${v.title}</h4><span>${v.cat}</span></div>
                            <div class="cmd-item-badges">
                                <span class="cmd-cat-badge">${v.cat}</span>
                                <span class="cmd-dur-badge">${v.duration}</span>
                            </div>
                        </div>
                    `).join('')}
                `;
            }
        }

        function highlightItem(idx) {
            document.querySelectorAll('.cmd-item').forEach((el, i) => el.classList.toggle('selected', i === idx + recentSearches.length + 1));
        }

        function openPalette() {
            document.getElementById('cmdOverlay').classList.add('open');
            document.getElementById('cmdInput').value = '';
            renderResults();
            setTimeout(() => document.getElementById('cmdInput').focus(), 100);
        }

        function closePalette() {
            document.getElementById('cmdOverlay').classList.remove('open');
        }

        function searchPalette(q) { renderResults(q); }

        function playVideo(title) {
            closePalette();
            document.getElementById('cmdVideoTitle').textContent = title;
            document.getElementById('cmdVideoModal').classList.add('open');
        }

        function closeVideo() {
            document.getElementById('cmdVideoModal').classList.remove('open');
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                openPalette();
            }
            if (e.key === 'Escape') {
                if (document.getElementById('cmdVideoModal').classList.contains('open')) {
                    closeVideo();
                } else {
                    closePalette();
                }
            }
        });

        renderResults();
    </script>
</body>
</html>
