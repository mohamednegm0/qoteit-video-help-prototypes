    <style>
        /* ===== Sidebar Player Layout ===== */
        .help-layout {
            display: flex;
            height: calc(100vh - 70px);
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .help-sidebar {
            width: 340px;
            background: var(--bg-card);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width 0.3s ease, transform 0.3s ease;
            overflow: hidden;
        }
        .help-sidebar.collapsed {
            width: 0;
            transform: translateX(100%);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-header h2 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-header h2 i { color: #127EE3; }
        .sidebar-toggle-btn {
            width: 32px; height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .sidebar-toggle-btn:hover { background: var(--bg-main); }

        .sidebar-search {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .sidebar-search input {
            width: 100%;
            height: 38px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0 12px;
            font-family: inherit;
            font-size: 13px;
            background: var(--bg-main);
            outline: none;
        }
        .sidebar-search input:focus { border-color: #127EE3; }

        .sidebar-progress {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .progress-bar-bg {
            flex: 1;
            height: 6px;
            background: #E2E5EC;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #127EE3, #49B3C9);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .progress-text {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .sidebar-categories {
            flex: 1;
            overflow-y: auto;
        }

        /* Accordion categories */
        .sb-category {
            border-bottom: 1px solid var(--border-color);
        }
        .sb-cat-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.15s;
        }
        .sb-cat-header:hover { background: #F8FAFC; }
        .sb-cat-header .cat-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .sb-cat-header .cat-title i {
            color: var(--brand-teal);
            font-size: 14px;
            width: 20px;
            text-align: center;
        }
        .sb-cat-header .cat-count {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-main);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .sb-cat-header .chevron {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.25s;
        }
        .sb-category.open .chevron { transform: rotate(180deg); }

        .sb-cat-items {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .sb-category.open .sb-cat-items { max-height: 500px; }

        .sb-video-item {
            padding: 10px 16px 10px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid #f0f0f0;
        }
        .sb-video-item:hover { background: #F8FAFC; }
        .sb-video-item.active {
            background: #E6F0FF;
            border-right: 3px solid #127EE3;
        }

        .sb-item-num {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .sb-video-item.active .sb-item-num {
            background: #127EE3;
            border-color: #127EE3;
            color: #fff;
        }
        .sb-video-item.watched .sb-item-num {
            background: #009688;
            border-color: #009688;
            color: #fff;
        }
        .sb-video-item.watched .sb-item-num::after { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; font-size: 10px; }

        .sb-item-info { flex: 1; min-width: 0; }
        .sb-item-info h4 {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sb-item-info span { font-size: 11px; color: var(--text-muted); }

        .sb-item-dur {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Main Player Area */
        .help-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            overflow-y: auto;
        }
        .player-wrapper {
            background: #0d0d1a;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .player-placeholder {
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16/9;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .player-play-btn {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: rgba(18,126,227,0.9);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 32px rgba(18,126,227,0.4);
        }
        .player-play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(18,126,227,0.5);
        }

        .player-info {
            max-width: 960px;
            margin: 0 auto;
            padding: 28px 40px;
        }
        .player-info-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .player-info h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .player-info .video-cat-tag {
            font-size: 12px;
            padding: 4px 14px;
            border-radius: 16px;
            background: #E6F0FF;
            color: #127EE3;
            font-weight: 500;
        }
        .player-info p {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .player-nav-btns {
            display: flex;
            gap: 12px;
        }
        .player-nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .player-nav-btn:hover {
            border-color: #127EE3;
            color: #127EE3;
        }
        .player-nav-btn.primary {
            background: #127EE3;
            color: white;
            border-color: #127EE3;
        }
        .player-nav-btn.primary:hover { background: #0d6bd0; }

        /* Mobile sidebar toggle */
        .mobile-sidebar-toggle {
            display: none;
            position: fixed;
            top: 84px;
            right: 16px;
            z-index: 50;
            width: 42px; height: 42px;
            border-radius: 8px;
            background: #127EE3;
            color: #fff;
            border: none;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(18,126,227,0.3);
        }

        @media (max-width: 768px) {
            .help-layout { flex-direction: column; height: auto; }
            .help-sidebar {
                width: 100%;
                max-height: 50vh;
                border-left: none;
                border-bottom: 1px solid var(--border-color);
                transform: none;
            }
            .help-sidebar.collapsed {
                max-height: 0;
                width: 100%;
                transform: none;
            }
            .mobile-sidebar-toggle { display: flex; align-items: center; justify-content: center; }
            .player-info { padding: 20px 16px; }
            .player-info h1 { font-size: 20px; }
            .player-info-top { flex-direction: column; gap: 8px; }
        }
    </style>

                videos: [
                    { id: 3, title: 'إضافة منتج', desc: 'أضف منتجاتك وخدماتك مع الأسعار والتفاصيل الكاملة', duration: '2:45', watched: true },
                    { id: 8, title: 'إضافة تصنيف', desc: 'نظّم منتجاتك وخدماتك باستخدام التصنيفات المخصصة', duration: '1:40', watched: false },
                ]
            },
            {
                name: 'التسعيرات', icon: 'fa-file-invoice-dollar',
                videos: [
                    { id: 4, title: 'إنشاء عرض سعر', desc: 'أنشئ عرض سعر احترافي وأرسله لعميلك مباشرة من النظام', duration: '4:00', watched: false },
                ]
            },
            {
                name: 'الإعدادات', icon: 'fa-screwdriver-wrench',
                videos: [
                    { id: 5, title: 'الإعداد وبدء الاستخدام', desc: 'ابدأ رحلتك مع كوت إت — إعداد الحساب خطوة بخطوة', duration: '5:20', watched: false },
                    { id: 6, title: 'إعدادات التحكم في أنواع الضرائب', desc: 'أضف وعدّل أنواع الضرائب المطبّقة على تسعيراتك', duration: '2:10', watched: false },
                    { id: 7, title: 'تخصيص الشروط والأحكام', desc: 'خصص الشروط والأحكام التي تظهر في عروض الأسعار', duration: '1:55', watched: false },
                    { id: 9, title: 'إضافة حقول مخصصة', desc: 'أضف حقول إضافية تناسب طبيعة عملك واحتياجاتك', duration: '3:00', watched: false },
                ]
            },
        ];

        let currentVideoId = 5;
        let allVideos = categories.flatMap(c => c.videos.map(v => ({ ...v, catName: c.name })));

        function renderSidebar(search = '') {
            const container = document.getElementById('sidebarCategories');
            container.innerHTML = categories.map((cat, ci) => {
                const filtered = cat.videos.filter(v => v.title.includes(search));
                if (filtered.length === 0 && search) return '';
                return `
                    <div class="sb-category open">
                        <div class="sb-cat-header" onclick="this.parentElement.classList.toggle('open')">
                            <span class="cat-title"><i class="fa-solid ${cat.icon}"></i>${cat.name}</span>
                            <span style="display:flex;align-items:center;gap:8px;">
                                <span class="cat-count">${cat.videos.length} فيديو</span>
                                <i class="fa-solid fa-chevron-down chevron"></i>
                            </span>
                        </div>
                        <div class="sb-cat-items">
                            ${filtered.map((v, vi) => `
                                <div class="sb-video-item ${v.id === currentVideoId ? 'active' : ''} ${v.watched ? 'watched' : ''}" onclick="selectVideo(${v.id})">
                                    <div class="sb-item-num">${v.watched ? '' : (vi+1)}</div>
                                    <div class="sb-item-info">
                                        <h4>${v.title}</h4>
                                        <span>${v.duration}</span>
                                    </div>
                                    <div class="sb-item-dur">${v.duration}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectVideo(id) {
            currentVideoId = id;
            const v = allVideos.find(x => x.id === id);
            document.getElementById('playerTitle').textContent = v.title;
            document.getElementById('playerDesc').textContent = v.desc;
            document.getElementById('playerCat').textContent = v.catName;
            renderSidebar();
        }

        function nextVideo() {
            const idx = allVideos.findIndex(v => v.id === currentVideoId);
            if (idx < allVideos.length - 1) selectVideo(allVideos[idx + 1].id);
        }

        function prevVideo() {
            const idx = allVideos.findIndex(v => v.id === currentVideoId);
            if (idx > 0) selectVideo(allVideos[idx - 1].id);
        }

        function toggleSidebar() {
            document.getElementById('helpSidebar').classList.toggle('collapsed');
        }

        function searchSidebar(q) { renderSidebar(q); }

        renderSidebar();
    </script>
</body>
</html>
