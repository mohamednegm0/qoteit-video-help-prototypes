    <style>
        /* ===== Chatbot Video Assistant ===== */
        .chat-fab {
            position: fixed;
            bottom: 32px;
            left: 32px;
            z-index: 1000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #127EE3, #49B3C9);
            color: #fff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 6px 24px rgba(18,126,227,0.35);
            transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
        }
        .chat-fab:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 32px rgba(18,126,227,0.45);
        }
        .chat-fab.active {
            transform: rotate(90deg);
            background: linear-gradient(135deg, #F1646C, #F3A73D);
        }
        .chat-fab .fab-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: #F1646C;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
        }

        /* Chat Panel */
        .chat-panel {
            position: fixed;
            bottom: 104px;
            left: 32px;
            z-index: 999;
            width: 400px;
            height: 560px;
            max-height: 70vh;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            transition: opacity 0.35s cubic-bezier(.34,1.56,.64,1), transform 0.35s cubic-bezier(.34,1.56,.64,1);
        }
        .chat-panel.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .chat-header {
            background: linear-gradient(135deg, #127EE3, #0d6bd0);
            color: #fff;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header-avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .chat-header-info h3 {
            font-size: 15px;
            font-weight: 600;
        }
        .chat-header-info span {
            font-size: 12px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .chat-header-info .online-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-main);
        }

        .msg {
            max-width: 85%;
            display: flex;
            flex-direction: column;
        }
        .msg.bot { align-self: flex-start; }
        .msg.user { align-self: flex-end; }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.7;
        }
        .msg.bot .msg-bubble {
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-right: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .msg.user .msg-bubble {
            background: #127EE3;
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 4px;
        }
        .msg.user .msg-time { text-align: left; }

        /* Video card in chat */
        .chat-video-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-top: 4px;
            max-width: 85%;
        }
        .chat-video-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        .chat-video-thumb .cv-play {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: rgba(18,126,227,0.9);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 18px;
            transition: transform 0.2s;
        }
        .chat-video-thumb:hover .cv-play { transform: scale(1.1); }
        .chat-video-thumb .cv-dur {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .chat-video-body {
            padding: 12px 14px;
        }
        .chat-video-body h4 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .chat-video-body p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Quick reply buttons */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 0 16px 12px;
        }
        .quick-reply-btn {
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            font-family: inherit;
            font-size: 12px;
            color: var(--brand-primary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-reply-btn:hover {
            background: #E6F0FF;
            border-color: #B3D4FF;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 16px;
            width: fit-content;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .typing-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #ccc;
            animation: typingBounce 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); background: #ccc; }
            30% { transform: translateY(-5px); background: #127EE3; }
        }

        /* Chat input */
        .chat-input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--bg-card);
        }
        .chat-input {
            flex: 1;
            height: 40px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0 16px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }
        .chat-input:focus { border-color: #127EE3; }
        .chat-send-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #127EE3;
            color: #fff;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .chat-send-btn:hover { background: #0d6bd0; }

        /* Suggested topics section */
        .suggested-topics {
            padding: 8px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .demo-page-content { padding: 40px 0; }

        @media (max-width: 768px) {
            .chat-panel {
                left: 16px;
                right: 16px;
                width: auto;
                bottom: 88px;
                height: 65vh;
            }
            .chat-fab {
                bottom: 20px;
                left: 20px;
                width: 52px;
                height: 52px;
                font-size: 22px;
            }
        }
    </style>

            ],
            products: [
                { title: 'إضافة منتج', desc: 'أضف منتجاتك وخدماتك', duration: '2:45', icon: 'fa-box' },
                { title: 'إضافة تصنيف', desc: 'نظّم المنتجات بالتصنيفات', duration: '1:40', icon: 'fa-tags' },
            ],
            quotes: [
                { title: 'إنشاء عرض سعر', desc: 'أنشئ عرض سعر احترافي', duration: '4:00', icon: 'fa-file-invoice-dollar' },
            ],
            settings: [
                { title: 'إعدادات التحكم في أنواع الضرائب', desc: 'أضف وعدّل أنواع الضرائب', duration: '2:10', icon: 'fa-percent' },
                { title: 'تخصيص الشروط والأحكام', desc: 'خصص شروط عروض الأسعار', duration: '1:55', icon: 'fa-file-contract' },
                { title: 'إضافة حقول مخصصة', desc: 'أضف حقول تناسب عملك', duration: '3:00', icon: 'fa-sliders' },
            ],
            onboarding: [
                { title: 'الإعداد وبدء الاستخدام', desc: 'ابدأ رحلتك مع كوت إت', duration: '5:20', icon: 'fa-rocket' },
            ],
        };

        const topicLabels = {
            customers: 'العملاء',
            products: 'المنتجات',
            quotes: 'التسعيرات',
            settings: 'الإعدادات',
            onboarding: 'البدء'
        };

        const botResponses = {
            customers: 'ممتاز! إليك فيديوهات تشرح كيف تدير العملاء في كوت إت:',
            products: 'تبي تتعلّم عن المنتجات؟ شوف هذي الفيديوهات:',
            quotes: 'إنشاء عروض الأسعار سهل! شوف هذا الفيديو:',
            settings: 'إليك فيديوهات الإعدادات والتخصيص:',
            onboarding: 'أهلًا بك! ابدأ من هنا — هذا الفيديو يشرح كل شيء:'
        };

        const followUps = {
            customers: ['كيف أنشئ عرض سعر؟', 'كيف أضيف منتج؟'],
            products: ['كيف أضيف تصنيف؟', 'كيف أنشئ عرض سعر؟'],
            quotes: ['كيف أضيف ضرائب؟', 'كيف أخصص الشروط؟'],
            settings: ['كيف أبدأ من الصفر؟', 'كيف أضيف عميل؟'],
            onboarding: ['كيف أضيف عميل؟', 'كيف أضيف منتج؟']
        };

        function toggleChat() {
            const panel = document.getElementById('chatPanel');
            const fab = document.getElementById('chatFab');
            panel.classList.toggle('open');
            fab.classList.toggle('active');
            // Hide badge
            const badge = fab.querySelector('.fab-badge');
            if (badge) badge.style.display = 'none';
        }

        function addUserMessage(text) {
            const container = document.getElementById('chatMessages');
            container.innerHTML += `
                <div class="msg user">
                    <div class="msg-bubble">${text}</div>
                    <span class="msg-time">الآن</span>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
        }

        function addTypingIndicator() {
            const container = document.getElementById('chatMessages');
            container.innerHTML += `
                <div class="msg bot" id="typingMsg">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typingMsg');
            if (el) el.remove();
        }

        function addBotMessage(text) {
            const container = document.getElementById('chatMessages');
            container.innerHTML += `
                <div class="msg bot">
                    <div class="msg-bubble">${text}</div>
                    <span class="msg-time">الآن</span>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
        }

        function addVideoCard(video) {
            const container = document.getElementById('chatMessages');
            container.innerHTML += `
                <div class="chat-video-card">
                    <div class="chat-video-thumb">
                        <div class="cv-play"><i class="fa-solid fa-play" style="margin-right: -2px;"></i></div>
                        <span class="cv-dur">${video.duration}</span>
                    </div>
                    <div class="chat-video-body">
                        <h4>${video.title}</h4>
                        <p>${video.desc}</p>
                    </div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
        }

        function addFollowUpButtons(topic) {
            const fups = followUps[topic] || [];
            if (fups.length === 0) return;
            const container = document.getElementById('chatMessages');
            container.innerHTML += `
                <div class="msg bot" style="margin-top: 4px;">
                    <div class="msg-bubble" style="font-size: 13px; color: var(--text-secondary);">هل تبي تتعلّم شيء ثاني؟</div>
                </div>
            `;
            const quickReplies = document.getElementById('quickReplies');
            quickReplies.innerHTML = fups.map(f => `
                <button class="quick-reply-btn" onclick="handleFollowUp('${f}')">${f}</button>
            `).join('') + `<button class="quick-reply-btn" onclick="resetQuickReplies()">العودة للقائمة الرئيسية</button>`;
            container.scrollTop = container.scrollHeight;
        }

        function selectTopic(topic) {
            const label = topicLabels[topic];
            addUserMessage(label);
            document.getElementById('quickReplies').innerHTML = '';

            addTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                addBotMessage(botResponses[topic]);

                const topicVideos = videos[topic] || [];
                topicVideos.forEach((v, i) => {
                    setTimeout(() => addVideoCard(v), i * 300);
                });

                setTimeout(() => addFollowUpButtons(topic), topicVideos.length * 300 + 200);
            }, 1000);
        }

        function handleFollowUp(text) {
            addUserMessage(text);
            document.getElementById('quickReplies').innerHTML = '';

            // Map follow-up text to topic
            const mapping = {
                'كيف أنشئ عرض سعر؟': 'quotes',
                'كيف أضيف منتج؟': 'products',
                'كيف أضيف تصنيف؟': 'products',
                'كيف أضيف ضرائب؟': 'settings',
                'كيف أخصص الشروط؟': 'settings',
                'كيف أبدأ من الصفر؟': 'onboarding',
                'كيف أضيف عميل؟': 'customers',
            };
            const topic = mapping[text] || 'onboarding';

            addTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                addBotMessage(botResponses[topic]);
                const topicVideos = videos[topic] || [];
                topicVideos.forEach((v, i) => {
                    setTimeout(() => addVideoCard(v), i * 300);
                });
                setTimeout(() => addFollowUpButtons(topic), topicVideos.length * 300 + 200);
            }, 800);
        }

        function resetQuickReplies() {
            addUserMessage('القائمة الرئيسية');
            document.getElementById('quickReplies').innerHTML = '';
            addTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                addBotMessage('طيب! اختر الموضوع اللي تبي تتعلّمه:');
                document.getElementById('quickReplies').innerHTML = `
                    <button class="quick-reply-btn" onclick="selectTopic('customers')"><i class="fa-solid fa-users" style="margin-left: 4px;"></i> العملاء</button>
                    <button class="quick-reply-btn" onclick="selectTopic('products')"><i class="fa-solid fa-box" style="margin-left: 4px;"></i> المنتجات</button>
                    <button class="quick-reply-btn" onclick="selectTopic('quotes')"><i class="fa-solid fa-file-invoice-dollar" style="margin-left: 4px;"></i> التسعيرات</button>
                    <button class="quick-reply-btn" onclick="selectTopic('settings')"><i class="fa-solid fa-gear" style="margin-left: 4px;"></i> الإعدادات</button>
                    <button class="quick-reply-btn" onclick="selectTopic('onboarding')"><i class="fa-solid fa-rocket" style="margin-left: 4px;"></i> كيف أبدأ؟</button>
                `;
            }, 600);
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            addUserMessage(text);
            document.getElementById('quickReplies').innerHTML = '';

            // Simple keyword matching
            let topic = null;
            if (text.includes('عميل') || text.includes('عملاء')) topic = 'customers';
            else if (text.includes('منتج') || text.includes('تصنيف')) topic = 'products';
            else if (text.includes('عرض سعر') || text.includes('تسعير')) topic = 'quotes';
            else if (text.includes('إعداد') || text.includes('ضري') || text.includes('شروط') || text.includes('حقول')) topic = 'settings';
            else if (text.includes('بدء') || text.includes('أبدأ') || text.includes('جديد')) topic = 'onboarding';

            addTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                if (topic) {
                    addBotMessage(botResponses[topic]);
                    const topicVideos = videos[topic] || [];
                    topicVideos.forEach((v, i) => {
                        setTimeout(() => addVideoCard(v), i * 300);
                    });
                    setTimeout(() => addFollowUpButtons(topic), topicVideos.length * 300 + 200);
                } else {
                    addBotMessage('ما لقيت فيديو مطابق لسؤالك. جرّب اختيار أحد المواضيع:');
                    document.getElementById('quickReplies').innerHTML = `
                        <button class="quick-reply-btn" onclick="selectTopic('customers')">العملاء</button>
                        <button class="quick-reply-btn" onclick="selectTopic('products')">المنتجات</button>
                        <button class="quick-reply-btn" onclick="selectTopic('quotes')">التسعيرات</button>
                        <button class="quick-reply-btn" onclick="selectTopic('settings')">الإعدادات</button>
                    `;
                }
            }, 1000);
        }
    </script>
</body>
</html>
